name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  FLUTTER_CHANNEL: 'stable'

jobs:
  test-server:
    name: Test Node.js Server
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        shell: pwsh
        run: |
          Set-Location server
          npm install --legacy-peer-deps
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "[SUCCESS] Server dependencies installed"

      - name: Validate server modules
        shell: pwsh
        run: |
          Set-Location server
          node -e "
            const calc   = require('./src/calculator');
            const parser = require('./src/packet_parser');
            const names  = require('./src/skill_names');
            const ws     = require('./src/ws_server');
            console.log('[SUCCESS] All server modules loaded');
            console.log('  Skill names sample:', names.getSkillName(14010000));
          "
          if ($LASTEXITCODE -ne 0) { exit 1 }

  test-flutter:
    name: Test Flutter Build
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Get dependencies
        shell: pwsh
        run: |
          Set-Location frontend
          flutter pub get
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Analyze code
        shell: pwsh
        run: |
          Set-Location frontend
          flutter analyze
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run tests
        shell: pwsh
        run: |
          Set-Location frontend
          flutter test
          if ($LASTEXITCODE -ne 0) { exit 1 }

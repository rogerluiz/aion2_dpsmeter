name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versao do build (ex: v1.0.0)'
        required: false
        default: 'v0.0.0-dev'

env:
  NODE_VERSION: '18'
  FLUTTER_CHANNEL: 'stable'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            $v = "${{ github.ref_name }}"
          }
          $dist = "aion2_dpsmeter-$v-windows-x64"
          "VERSION=$v"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "DIST=$dist"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $v  |  Dist: $dist"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        shell: pwsh
        run: |
          Set-Location server
          npm install --legacy-peer-deps
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Dependencies installed"

      - name: Compile cap.node (Npcap native addon)
        shell: pwsh
        run: |
          # wpcap.lib versionada no repo (cap@0.2.1 nao inclui no tarball publicado no npm)
          $capLib = "server\node_modules\cap\deps\winpcap\Lib\x64"
          New-Item -Path $capLib -ItemType Directory -Force | Out-Null
          Copy-Item "server\vendor\wpcap.lib" "$capLib\wpcap.lib" -Force
          Write-Host "wpcap.lib copiado para $capLib"

          Set-Location server
          npm rebuild cap
          if ($LASTEXITCODE -ne 0) { Write-Error "Falha ao compilar cap.node"; exit 1 }
          $capNode = "node_modules\cap\build\Release\cap.node"
          if (-not (Test-Path $capNode)) {
            Write-Error "cap.node nao encontrado apos compilacao"
            exit 1
          }
          $sz = [math]::Round((Get-Item $capNode).Length / 1KB, 1)
          Write-Host "cap.node compilado: $sz KB"

      - name: Build Node.js server with pkg
        shell: pwsh
        run: |
          Set-Location server
          npm run build
          if ($LASTEXITCODE -ne 0) { exit 1 }
          $exe = "dist\aion2_server.exe"
          if (-not (Test-Path $exe)) { Write-Error "aion2_server.exe not found"; exit 1 }
          $sz = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "aion2_server.exe: $sz MB"

      - name: Prepare code signing certificate
        id: codesign
        shell: pwsh
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_PFX_PASSWORD)) {
            "ENABLED=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Code signing disabled: secrets not configured"
            exit 0
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -like "*x64*" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { Write-Error "signtool.exe not found"; exit 1 }
          "ENABLED=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "SIGNTOOL=$signtool" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Code signing enabled"

      - name: Sign backend executable
        if: ${{ steps.codesign.outputs.ENABLED == 'true' }}
        shell: pwsh
        env:
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          & "${{ steps.codesign.outputs.SIGNTOOL }}" sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f "${{ steps.codesign.outputs.PFX_PATH }}" /p "$env:WINDOWS_PFX_PASSWORD" "server\dist\aion2_server.exe"
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to sign aion2_server.exe"; exit 1 }
          Write-Host "Signed aion2_server.exe"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Flutter pub get
        shell: pwsh
        run: |
          Set-Location frontend
          flutter pub get
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Copy server to Flutter assets
        shell: pwsh
        run: |
          New-Item -Path frontend/assets/backend -ItemType Directory -Force | Out-Null
          Copy-Item server/dist/aion2_server.exe frontend/assets/backend/aion2_server.exe -Force
          # cap.node deve ficar ao lado do exe para o pkg runtime carregar do filesystem real
          Copy-Item server/node_modules/cap/build/Release/cap.node server/dist/cap.node -Force
          Copy-Item server/dist/cap.node frontend/assets/backend/cap.node -Force
          Write-Host "Server + cap.node copied to assets/backend/"

      - name: Build Flutter Windows Release
        shell: pwsh
        run: |
          Set-Location frontend
          flutter build windows --release
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Flutter build completed"

      - name: Sign Flutter executable
        if: ${{ steps.codesign.outputs.ENABLED == 'true' }}
        shell: pwsh
        env:
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          $appExe = "frontend\build\windows\x64\runner\Release\aion2_dpsmeter.exe"
          & "${{ steps.codesign.outputs.SIGNTOOL }}" sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f "${{ steps.codesign.outputs.PFX_PATH }}" /p "$env:WINDOWS_PFX_PASSWORD" $appExe
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to sign aion2_dpsmeter.exe"; exit 1 }
          Write-Host "Signed aion2_dpsmeter.exe"

      - name: Create distribution package
        id: dist
        shell: pwsh
        run: |
          $v    = "${{ steps.ver.outputs.VERSION }}"
          $name = "${{ steps.ver.outputs.DIST }}"
          $src  = "frontend/build/windows/x64/runner/Release"

          # ZIP portátil
          New-Item -Path $name -ItemType Directory -Force | Out-Null
          Copy-Item -Recurse "$src/*" "$name/" -Force

          @(
            "# AION 2 DPS Meter - $v",
            "",
            "## Requisitos",
            "- Windows 10/11 (64-bit)",
            "- Npcap: https://npcap.com/#download",
            "  (marque 'WinPcap API-compatible Mode')",
            "- Executar como Administrador",
            "",
            "## Uso",
            "1. Execute aion2_dpsmeter.exe como Administrador",
            "2. Inicie o AION 2 TW",
            "3. Entre em combate para ver DPS/HPS em tempo real"
          ) | Out-File -FilePath "$name/README.txt" -Encoding UTF8

          Compress-Archive -Path $name -DestinationPath "$name.zip" -Force
          Write-Host "ZIP: $name.zip ($([math]::Round((Get-Item "$name.zip").Length/1MB,1)) MB)"

          # Pasta dist/ para o NSIS
          New-Item -Path installer/dist -ItemType Directory -Force | Out-Null
          Copy-Item -Recurse "$src/*" "installer/dist/" -Force

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --yes --no-progress
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to install NSIS"; exit 1 }
          Write-Host "NSIS installed"

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.VERSION }}"
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) { Write-Error "makensis not found at $makensis"; exit 1 }
          Set-Location installer
          & $makensis /DVERSION=$v aion2_dpsmeter.nsi
          if ($LASTEXITCODE -ne 0) { Write-Error "makensis failed"; exit 1 }
          $sz = [math]::Round((Get-Item "aion2_dpsmeter-$v-setup.exe").Length/1MB,1)
          Write-Host "Installer: aion2_dpsmeter-$v-setup.exe ($sz MB)"

      - name: Sign NSIS installer
        if: ${{ steps.codesign.outputs.ENABLED == 'true' }}
        shell: pwsh
        env:
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          $setupExe = "installer\aion2_dpsmeter-${{ steps.ver.outputs.VERSION }}-setup.exe"
          & "${{ steps.codesign.outputs.SIGNTOOL }}" sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f "${{ steps.codesign.outputs.PFX_PATH }}" /p "$env:WINDOWS_PFX_PASSWORD" $setupExe
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to sign setup.exe"; exit 1 }
          Write-Host "Signed installer"

      - name: Generate changelog
        shell: pwsh
        run: |
          $prevTag = git describe --abbrev=0 --tags HEAD^ 2>$null
          if ($LASTEXITCODE -ne 0 -or -not $prevTag) {
            $changes = git log --pretty=format:"- %s" -n 20
          } else {
            $changes = git log --pretty=format:"- %s" "${prevTag}..HEAD"
          }
          @(
            "## O que mudou",
            "",
            ($changes -join "`n"),
            "",
            "## Requisitos",
            "- Windows 10/11 (64-bit)",
            "- [Npcap](https://npcap.com/#download) com WinPcap API-compatible Mode",
            "- Executar como Administrador"
          ) | Out-File -FilePath changelog.md -Encoding UTF8

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: |
            ${{ steps.ver.outputs.DIST }}.zip
            installer/aion2_dpsmeter-${{ steps.ver.outputs.VERSION }}-setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.DIST }}
          path: |
            ${{ steps.ver.outputs.DIST }}.zip
            installer/aion2_dpsmeter-${{ steps.ver.outputs.VERSION }}-setup.exe
          retention-days: 30

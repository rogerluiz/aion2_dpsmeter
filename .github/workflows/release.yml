name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versao do build (ex: v1.0.0)'
        required: false
        default: 'v0.0.0-dev'

env:
  NODE_VERSION: '18'
  FLUTTER_CHANNEL: 'stable'

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            $v = "${{ github.ref_name }}"
          }
          $dist = "aion2_dpsmeter-$v-windows-x64"
          "VERSION=$v"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "DIST=$dist"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $v  |  Dist: $dist"

      # Npcap é necessário para o módulo nativo 'cap' compilar
      - name: Install Npcap
        shell: pwsh
        run: |
          $out = "$env:TEMP\npcap.exe"
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-1.79.exe" -OutFile $out -UseBasicParsing
          Start-Process -FilePath $out -ArgumentList "/S", "/winpcap_mode=yes" -Wait
          Write-Host "Npcap installed"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        shell: pwsh
        run: |
          Set-Location server
          npm install --legacy-peer-deps
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Dependencies installed"

      - name: Build Node.js server with pkg
        shell: pwsh
        run: |
          Set-Location server
          npm run build
          if ($LASTEXITCODE -ne 0) { exit 1 }
          $exe = "dist\aion2_server.exe"
          if (-not (Test-Path $exe)) { Write-Error "aion2_server.exe not found"; exit 1 }
          $sz = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "aion2_server.exe: $sz MB"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Flutter pub get
        shell: pwsh
        run: |
          Set-Location frontend
          flutter pub get
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Copy server to Flutter assets
        shell: pwsh
        run: |
          New-Item -Path frontend/assets/backend -ItemType Directory -Force | Out-Null
          Copy-Item server/dist/aion2_server.exe frontend/assets/backend/aion2_server.exe -Force
          Write-Host "Server copied to assets/backend/"

      - name: Build Flutter Windows Release
        shell: pwsh
        run: |
          Set-Location frontend
          flutter build windows --release
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Flutter build completed"

      - name: Create distribution package
        id: dist
        shell: pwsh
        run: |
          $name = "${{ steps.ver.outputs.DIST }}"
          New-Item -Path $name -ItemType Directory -Force | Out-Null
          Copy-Item -Recurse "frontend/build/windows/x64/runner/Release/*" "$name/" -Force

          @(
            "# AION 2 DPS Meter - ${{ steps.ver.outputs.VERSION }}",
            "",
            "## Requisitos",
            "- Windows 10/11 (64-bit)",
            "- Npcap instalado: https://npcap.com/#download",
            "  (marque 'WinPcap API-compatible Mode' na instalacao)",
            "- Executar como Administrador",
            "",
            "## Uso",
            "1. Execute frontend.exe como Administrador",
            "2. Inicie o AION 2 TW",
            "3. Entre em combate para ver DPS/HPS em tempo real",
            "",
            "## Troubleshooting",
            "- Verifique se o Npcap esta instalado",
            "- Execute como Administrador",
            "- Verifique antivirus/firewall"
          ) | Out-File -FilePath "$name/README.txt" -Encoding UTF8

          Compress-Archive -Path $name -DestinationPath "$name.zip" -Force
          Write-Host "Package: $name.zip ($([math]::Round((Get-Item "$name.zip").Length / 1MB, 1)) MB)"

      - name: Generate changelog
        shell: pwsh
        run: |
          $prevTag = git describe --abbrev=0 --tags HEAD^ 2>$null
          if ($LASTEXITCODE -ne 0 -or -not $prevTag) {
            $changes = git log --pretty=format:"- %s" -n 20
          } else {
            $changes = git log --pretty=format:"- %s" "${prevTag}..HEAD"
          }
          @(
            "## O que mudou",
            "",
            ($changes -join "`n"),
            "",
            "## Requisitos",
            "- Windows 10/11 (64-bit)",
            "- [Npcap](https://npcap.com/#download) com WinPcap API-compatible Mode",
            "- Executar como Administrador"
          ) | Out-File -FilePath changelog.md -Encoding UTF8

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: ${{ steps.ver.outputs.DIST }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.DIST }}
          path: ${{ steps.ver.outputs.DIST }}.zip
          retention-days: 30
